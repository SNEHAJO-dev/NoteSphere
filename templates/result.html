<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NoteSphere — Result</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <nav>
    <h2>NoteSphere</h2>
    <a href="/archive">View Archive</a>
  </nav>

  <div style="max-width:760px;margin:32px auto;padding:0 20px">
    <h1 style="font-size:24px;margin-bottom:8px">Notes Processed</h1>
    <div class="meta-bar">
      <span class="meta-pill">{{ student_name }}</span>
      <span class="meta-pill">{{ subject }}</span>
      <span class="meta-pill">{{ filename }}</span>
    </div>

    <div class="notes-section">
      <h3>AI Formatted Notes</h3>
      <div class="notes-box">
        <div id="ai-notes"></div>
        <script>
          document.getElementById('ai-notes').innerHTML =
            marked.parse(`{{ formatted_notes }}`);
        </script>
      </div>
    </div>

    <div class="action-row">
      <a href="/" class="btn-primary"
         style="max-width:200px;text-align:center;text-decoration:none">
        Upload Another
      </a>
      <a href="/archive" class="btn-secondary">
        View Archive
      </a>
    </div>
  </div>
</body>
</html>
