<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NoteSphere — Result</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #f0f2ff;
      --surface: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --indigo: #4f46e5;
      --indigo-light: #e0e7ff;
      --border: #e5e7eb;
    }
    [data-theme="dark"] {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --text: #e8e8f0;
      --muted: #9ca3af;
      --indigo: #818cf8;
      --indigo-light: #1e1b4b;
      --border: #2d2d3f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    nav {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 12px rgba(79,70,229,0.3);
    }
    nav h2 { color: white; font-size: 20px; font-weight: 700; }
    nav .nav-right { display: flex; align-items: center; gap: 12px; }
    nav a {
      color: white; text-decoration: none; font-size: 13px;
      background: rgba(255,255,255,0.15); padding: 7px 16px;
      border-radius: 20px; transition: background 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.25); }
    .dark-toggle {
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      font-size: 16px; display: flex; align-items: center;
      justify-content: center; transition: background 0.2s;
    }
    .dark-toggle:hover { background: rgba(255,255,255,0.25); }
    .result-wrap { max-width: 800px; margin: 36px auto; padding: 0 20px 60px; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
    .meta-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .meta-pill {
      background: var(--indigo-light); color: var(--indigo);
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
    .img-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(79,70,229,0.07);
    }
    .img-panel-header {
      padding: 12px 16px; font-size: 12px; font-weight: 700;
      color: var(--indigo); text-transform: uppercase;
      letter-spacing: 0.05em; border-bottom: 1px solid var(--border);
      background: var(--indigo-light);
    }
    .img-panel img {
      width: 100%; display: block; object-fit: cover;
      max-height: 380px; cursor: zoom-in;
    }
    .notes-panel {
      background: var(--surface); border: 1.5px solid var(--indigo);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(79,70,229,0.1);
    }
    .notes-panel-header {
      padding: 12px 16px; font-size: 12px; font-weight: 700;
      color: white; text-transform: uppercase; letter-spacing: 0.05em;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
    }
    .notes-panel-body {
      padding: 20px; font-size: 13px;
      line-height: 1.85; color: var(--text);
      overflow-y: auto; max-height: 380px;
    }
    .notes-panel-body h1,
    .notes-panel-body h2 { font-size: 15px; margin-bottom: 8px; color: var(--text); }
    .notes-panel-body ul { padding-left: 18px; }
    .notes-panel-body li { margin-bottom: 5px; }
    .notes-panel-body strong { color: var(--text); }
    .action-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .btn-primary {
      padding: 12px 24px; background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white; border: none; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; text-decoration: none;
      display: inline-block; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary {
      padding: 12px 24px; border: 1.5px solid var(--indigo);
      color: var(--indigo); background: transparent; border-radius: 10px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      display: inline-block; transition: background 0.2s;
    }
    .btn-secondary:hover { background: var(--indigo-light); }
    .btn-copy {
      padding: 12px 20px; background: var(--surface);
      border: 1.5px solid var(--border); color: var(--muted);
      border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-copy:hover { border-color: var(--indigo); color: var(--indigo); }
    .lightbox-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .lightbox-overlay.open { display: flex; }
    .lightbox-overlay img {
      max-width: 90vw; max-height: 88vh;
      border-radius: 10px; object-fit: contain;
    }
    .lightbox-close {
      position: fixed; top: 20px; right: 24px;
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 38px; height: 38px; border-radius: 50%; font-size: 18px;
      cursor: pointer;
    }
    .result-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--indigo);
      letter-spacing: -0.3px;
    }
    .nav-links {
      display: flex;
      gap: 24px;
      flex: 1;
    }
    .nav-links a {
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.2s;
      line-height: 1;
    }
    .nav-icon-btn:hover { background: var(--indigo-light); }
    .success-header {
      text-align: center;
      padding: 36px 20px 24px;
    }
    .success-check {
      width: 56px;
      height: 56px;
      background: var(--indigo);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      margin: 0 auto 18px;
      box-shadow: 0 4px 16px rgba(79,70,229,0.35);
    }
    .success-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    .success-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }
    .meta-info-row {
      display: flex;
      align-items: center;
      gap: 40px;
      padding: 18px 32px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .meta-info-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .meta-info-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .meta-info-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .meta-info-badge {
      margin-left: auto;
      background: var(--indigo-light);
      color: var(--indigo);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .action-row {
      display: flex;
      align-items: center;
      gap: 24px;
      justify-content: center;
      margin-top: 32px;
      margin-bottom: 24px;
    }
    .btn-stitch-primary {
      background: var(--indigo);
      color: white;
      padding: 13px 32px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-stitch-primary:hover { opacity: 0.88; }
    .btn-stitch-text {
      color: var(--indigo);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      background: none;
      transition: opacity 0.2s;
    }
    .btn-stitch-text:hover { opacity: 0.7; }
    .notes-panel-body h2 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--indigo);
      margin: 16px 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .notes-panel-body h2::before {
      content: '•';
      color: var(--indigo);
    }
    .notes-panel-body strong {
      display: block;
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }
  </style>
</head>
<body>
  <nav class="result-nav">
    <span class="nav-logo">NoteSphere</span>
    <div class="nav-right">
      <button class="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
      <button class="nav-icon-btn" title="Notifications">🔔</button>
      <button class="nav-icon-btn" title="Settings">⚙️</button>
      <button class="nav-icon-btn" title="Profile">👤</button>
    </div>
  </nav>

  <div class="result-wrap">
    <div class="success-header">
  <div class="success-check">✓</div>
  <h1 class="success-title">Note Uploaded Successfully!</h1>
  <p class="success-sub">The Digital Archive is now updated with your latest notes.</p>
    </div>

<div class="meta-info-row">
  <div class="meta-info-col">
    <span class="meta-info-label">UPLOADER</span>
    <span class="meta-info-value">{{ student_name }}</span>
  </div>
  <div class="meta-info-col">
    <span class="meta-info-label">SUBJECT</span>
    <span class="meta-info-value">{{ subject }}</span>
  </div>
  <div class="meta-info-col">
    <span class="meta-info-label">DATE</span>
    <span class="meta-info-value">{{ date_today }}</span>
  </div>
  <div class="meta-info-badge">
    ✨ AI Formatting Complete
  </div>
</div>

    <div class="two-col">
      <div class="img-panel">
        <div class="img-panel-header">📷 Uploaded Image</div>
        <img src="{{ image_url }}" alt="Uploaded notes"
             onclick="document.getElementById('lightbox').classList.add('open')">
      </div>

      <div class="notes-panel">
        <div class="notes-panel-header">📄 Formatted Digital Text</div>
        <div class="notes-panel-body" id="ai-notes"></div>
      </div>
    </div>

    <div class="action-row">
      <a href="/archive" class="btn-stitch-primary">View in Archive</a>
      <a href="/" class="btn-stitch-text">Upload Another Note</a>
    </div>
  </div>

  <div class="lightbox-overlay" id="lightbox"
       onclick="this.classList.remove('open')">
    <button class="lightbox-close"
            onclick="document.getElementById('lightbox').classList.remove('open')">✕</button>
    <img src="{{ image_url }}" alt="Notes fullscreen">
  </div>

  <script>
    const raw = {{ formatted_notes | tojson }};
    document.getElementById('ai-notes').innerHTML = marked.parse(raw);

    function copyNotes() {
      navigator.clipboard.writeText(raw).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = '📋 Copy Notes', 2000);
      });
    }

    function toggleDark() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.dark-toggle').textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.querySelector('.dark-toggle').textContent = '☀️';
      }
    })();
  </script>
</body>
</html>
